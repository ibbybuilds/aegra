# Docker Compose Configuration for LOCAL DEVELOPMENT ONLY
#
# This configuration is designed for local development with hot-reload support.
# For deployment environments, see:
#
# - Staging (Railway):
#   Uses deployments/docker/Dockerfile (same as local dev)
#   Railway auto-deploys from 'development' branch via GitHub integration
#   See docs/RAILWAY_DEPLOYMENT.md for setup instructions
#
# - Production (GKE):
#   Uses deployments/docker/Dockerfile.production (optimized for production)
#   GitHub Actions builds and pushes images from 'main' branch
#   Manual K8s deployment required (K8s manifests coming soon)
#   See docs/GKE_DEPLOYMENT.md for setup instructions

services:
  # PostgreSQL database for LangGraph and metadata
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aegra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d aegra"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Aegra Server
  aegra:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      args:
        - GH_PAT=${GH_PAT}
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/aegra
      - AUTH_TYPE=noop
      - DEBUG=true
      - PORT=${PORT:-8000}
      # Redis configuration for ava_v1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      # JWT authentication (for AUTH_TYPE=custom)
      - AEGRA_JWT_ALGORITHM=${AEGRA_JWT_ALGORITHM:-HS256}
      - AEGRA_JWT_SECRET=${AEGRA_JWT_SECRET}
      - AEGRA_JWT_ISSUERS=${AEGRA_JWT_ISSUERS}
      - AEGRA_JWT_AUDIENCE=${AEGRA_JWT_AUDIENCE}
      - AEGRA_JWT_VERIFY_EXPIRATION=${AEGRA_JWT_VERIFY_EXPIRATION:-true}
      - AEGRA_JWT_LEEWAY_SECONDS=${AEGRA_JWT_LEEWAY_SECONDS:-30}
      # Database connection pool (for load testing high-capacity configuration)
      - DB_POOL_SIZE=150
      - DB_MAX_OVERFLOW=50
      - DB_POOL_TIMEOUT=60
      - DB_POOL_RECYCLE=3600
      - DB_POOL_PRE_PING=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./aegra.json:/app/aegra.json:ro
      - ./graphs:/app/graphs:ro
      - ./src:/app/src:ro # for hot reload support of server
      - ./auth.py:/app/auth.py:ro
      - ./.env:/app/.env:ro
      - ./alembic:/app/alembic:ro # for migrations
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting Aegra server...' &&
        uvicorn src.agent_server.main:app --host 0.0.0.0 --port $${PORT:-8000} --reload --timeout-keep-alive 1800 --limit-concurrency 350
      "

  # Redis Stack (required for ava_v1 graph - includes RedisJSON, RedisSearch, etc.)
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight UI
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
